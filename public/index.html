    comfort: ['브런치 플레이트', '에그 베네딕트', '프렌치토스트', '수프 + 빵'],
    light: ['아사이볼', '그래놀라 요거트', '샐러드 플레이트', '스무디볼'],
    spicy: ['칠리 에그 토스트', '매콤 치아바타'],
    special: ['애프터눈 티 세트', '트러플 크로크무슈', '리코타 팬케이크'],
    quick: ['크로와상 + 커피', '베이글 샌드위치', '토스트 세트'],
    sweet: ['크로플', '당근 케이크', '스콘 세트', '마카롱', '크레페']
  }
};

var TIPS = {
  comfort: '오늘은 마음이 따뜻해지는 메뉴가 좋겠어요 🤗',
  light: '건강하게 한 끼, 좋은 선택이에요 💪',
  spicy: '매운 맛으로 스트레스 해소! 🔥',
  special: '특별한 날엔 특별한 메뉴를 🎊',
  quick: '시간이 없을 땐 빠르게! ⏱️',
  sweet: '달콤함이 필요한 순간이네요 🍬'
};

var currentMood = '';
var currentSituation = '';
var recommendations = [];
var revealed = [false, false, false];

function showStep(n) {
  document.getElementById('step0').className = (n === 0) ? '' : 'hidden';
  document.getElementById('step1').className = (n === 1) ? '' : 'hidden';
  document.getElementById('step2').className = (n === 2) ? '' : 'hidden';
  document.getElementById('step3').className = (n === 3) ? '' : 'hidden';
  document.getElementById('step4').className = (n === 4) ? '' : 'hidden';
}

function selectMood(mood) {
  currentMood = mood;
  var m = MOODS[mood];
  document.getElementById('moodBadge').innerHTML = m.emoji + ' ' + m.label + ' 기분이군요!';
  showStep(1);
  window.scrollTo(0, 0);
}

function selectSituation(sit) {
  currentSituation = sit;
  var m = MOODS[currentMood];
  var s = SITUATIONS[sit];
  var tagText = m.emoji + ' ' + m.label + ' · ' + s.emoji + ' ' + s.label;
  document.getElementById('tagInfo').innerHTML = tagText;
  document.getElementById('tagInfo2').innerHTML = tagText;
  showStep(2);
  window.scrollTo(0, 0);

  setTimeout(function() {
    recommendations = getRecommendations(currentMood, currentSituation, 3);
    revealed = [false, false, false];
    renderCards();
    showStep(3);
  }, 1800);
}

function getRecommendations(mood, situation, count) {
  var allMenus = [];
  var catKeys = Object.keys(MENU_DB);

  for (var c = 0; c < catKeys.length; c++) {
    var cat = catKeys[c];
    var items = (MENU_DB[cat] && MENU_DB[cat][mood]) ? MENU_DB[cat][mood] : [];
    for (var i = 0; i < items.length; i++) {
      var score = Math.random() * 10;
      if (situation === 'alone' && (cat === 'fast' || cat === 'snack' || cat === 'korean' || cat === 'chinese')) score += 3;
      if (situation === 'date' && (cat === 'japanese' || cat === 'western' || cat === 'cafe')) score += 4;
      if (situation === 'friends' && (cat === 'korean' || cat === 'chinese' || cat === 'fast')) score += 3;
      if (situation === 'family' && (cat === 'korean' || cat === 'chinese' || cat === 'japanese')) score += 3;
      if (situation === 'business' && (cat === 'korean' || cat === 'japanese' || cat === 'western')) score += 4;
      if (situation === 'delivery' && (cat === 'fast' || cat === 'chinese' || cat === 'korean')) score += 3;
      allMenus.push({ name: items[i], category: cat, score: score });
    }
  }

  allMenus.sort(function(a, b) { return b.score - a.score; });
  var seen = {};
  var result = [];
  for (var j = 0; j < allMenus.length; j++) {
    if (!seen[allMenus[j].name]) {
      seen[allMenus[j].name] = true;
      result.push(allMenus[j]);
    }
    if (result.length >= count) break;
  }
  return result;
}

function renderCards() {
  var html = '';
  for (var i = 0; i < recommendations.length; i++) {
    var r = recommendations[i];
    var cat = CATEGORIES[r.category];
    if (!revealed[i]) {
      html += '<div class="card" onclick="revealCard(' + i + ')">' +
        '<div class="card-hidden">' +
        '<span class="card-hidden-emoji">🎴</span>' +
        '<span class="card-hidden-text">터치하여 ' + (i + 1) + '번 메뉴 확인</span>' +
        '</div></div>';
    } else {
      html += '<div class="card" onclick="chooseMenu(' + i + ')">' +
        '<div class="card-revealed" style="background:linear-gradient(135deg,' + cat.color + '18,' + cat.color + '08);border:1px solid ' + cat.color + '30;">' +
        '<div class="card-icon" style="background:' + cat.color + '20;">' + cat.emoji + '</div>' +
        '<div class="card-info">' +
        '<div class="card-name">' + r.name + '</div>' +
        '<div class="card-cat" style="color:' + cat.color + ';">' + cat.label + '</div>' +
        '</div>' +
        '<div class="card-choose" style="background:' + cat.color + ';">이거!</div>' +
        '</div></div>';
    }
  }
  document.getElementById('cardsArea').innerHTML = html;
}

function revealCard(index) {
  revealed[index] = true;
  renderCards();
}

function chooseMenu(index) {
  var chosen = recommendations[index];
  var cat = CATEGORIES[chosen.category];
  var colors = ['#FF6B35', '#FFB347', '#2E86AB', '#E8453C', '#28A745', '#9B59B6'];

  var confettiHtml = '';
  for (var i = 0; i < 20; i++) {
    var left = Math.floor(Math.random() * 100);
    var dur = (2 + Math.random() * 2).toFixed(1);
    var delay = (Math.random() * 0.8).toFixed(1);
    var radius = Math.random() > 0.5 ? '50%' : '2px';
    confettiHtml += '<div class="confetti" style="left:' + left + '%;border-radius:' + radius + ';background:' + colors[i % 6] + ';animation:confettiFall ' + dur + 's ease-in ' + delay + 's both;"></div>';
  }

  var html = confettiHtml +
    '<div class="result-circle" style="background:linear-gradient(135deg,' + cat.color + '40,' + cat.color + '15);border:2px solid ' + cat.color + '60;">' + cat.emoji + '</div>' +
    '<h2 class="result-title">오늘의 메뉴</h2>' +
    '<p class="result-menu" style="color:' + cat.color + ';">' + chosen.name + '</p>' +
    '<span class="result-cat">' + cat.label + '</span>' +
    '<p class="result-tip">' + TIPS[currentMood] + '</p>' +
    '<button class="retry-btn" onclick="resetAll()">다시 추천받기</button>';

  document.getElementById('resultArea').innerHTML = html;
  showStep(4);
  window.scrollTo(0, 0);
}

function goBack() {
  showStep(0);
  window.scrollTo(0, 0);
}

function resetAll() {
  currentMood = '';
  currentSituation = '';
  recommendations = [];
  revealed = [false, false, false];
  showStep(0);
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
